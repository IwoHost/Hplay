      lib.forEach(s=>{ counts[s.album] = (counts[s.album]||0)+1; });
      const als = [...new Set(lib.map(s=>s.album))].filter(a=>counts[a] >= 2).sort((a,b)=>a.localeCompare(b));
      return {title:'Playlists', items: als.length ? als.map(a=>({lab:a, arrow:true, playlistName:a, go:{type:'songs', sel:0, top:0, filter:{album:a}}})) : [{lab:'No Playlists', dim:true}]};
    }
    case 'custom': return {title:'Customize', items:[
      {lab:'Body Color', arrow:true, val:themeName, go:{type:'colors', sel:allThemeNames().indexOf(themeName), top:0}},
      {lab:'Wheel Color', arrow:true, val:wheelName, go:{type:'wcolors', sel:['Match',...allThemeNames()].indexOf(wheelName), top:0}},
      {lab:'Screen', val: custom.dark?'Dark':'Light', act(){ custom.dark=!custom.dark; applyCustom(); saveSettings(); render(); }},
      {lab:'Wheel Size', val: custom.wheelSize, act(){ const o=Object.keys(WHEEL_SIZES); custom.wheelSize=o[(o.indexOf(custom.wheelSize)+1)%o.length]; applyCustom(); saveSettings(); render(); }},
      {lab:'Art Motion', val: custom.sway?'On':'Off', act(){ custom.sway=!custom.sway; applyCustom(); saveSettings(); render(); }},
      {lab:'Decals', arrow:true, go:{type:'decalsmanage', sel:0, top:0}},
      {lab:'Engraving…', val: custom.engraving||'None', act(){ const n=prompt('Engrave a short message', custom.engraving||''); if(n!=null){ custom.engraving=n.trim().slice(0,40); applyCustom(); saveSettings(); render(); } }},
      {lab:'Name…', val: custom.devName, act(){ const n=prompt('Name your Hplay', custom.devName); if(n&&n.trim()){ custom.devName=n.trim().slice(0,20); saveSettings(); render(); } }},
    ]};
    case 'colors': return {title:'Body Color', items: allThemeNames().map(n=>(
      {lab:n, val: n===themeName?'✓':'', act(){ applyTheme(n); saveSettings(); render(); }}
    ))};
    case 'wcolors': return {title:'Wheel Color', items: ['Match',...allThemeNames()].map(n=>(
      {lab:n, val: n===wheelName?'✓':'', act(){ applyWheelColor(n); saveSettings(); render(); }}
    ))};
    case 'settings': return {title:'Settings', items:[
      {lab:'Shuffle', val: settings.shuffle?'Songs':'Off', act(){ settings.shuffle=!settings.shuffle; saveSettings(); render(); }},
      {lab:'Repeat',  val: settings.repeat, act(){ settings.repeat = settings.repeat==='Off'?'One':settings.repeat==='One'?'All':'Off'; saveSettings(); render(); }},
      {lab:'Clicker', val: settings.clicker?'On':'Off', act(){ settings.clicker=!settings.clicker; saveSettings(); render(); }},
      {lab:'Sleep Timer', val: sleepMin?fmtClock(sleepRemaining()):'Off', arrow:true, go:{type:'sleeptimer', sel:0, top:0}},
      {lab:'About', arrow:true, go:{type:'about'}},
      {lab:'Erase Everything', danger:true, act(){ eraseAll(); }},
    ]};
    case 'search': {
      const q=(query||'').toLowerCase();
      const ids = q ? lib.filter(s=>(s.title+' '+s.artist+' '+s.album).toLowerCase().includes(q)).map(s=>s.id) : [];
      return {title:'Search', search:true, items: ids.length
        ? ids.map(id=>({lab:dispTitle(song(id).title), songId:id, act(){ buildPlaylist(ids,id,'Search Results'); stack.push({type:'np'}); render(); }}))
        : [{lab: q?'No matches':'Type above to search…', dim:true}]};
    }
    case 'confirmdel': return {title:'Delete', confirm:true};
    case 'sleeptimer': {
      const items = [
        {lab:'Duration', val: sleepMin?sleepMin+' min':'Off', arrow:true, go:{type:'sleepdur', sel: Math.max(0,SLEEP_DURS.indexOf(sleepMin)), top:0}},
        {lab:'When Done', val: sleepEndMode, act(){ const i=SLEEP_ENDS.indexOf(sleepEndMode); sleepEndMode=SLEEP_ENDS[(i+1)%SLEEP_ENDS.length]; if(sleepMin) startSleep(); saveSettings(); render(); }},
      ];
      if(sleepEndMode==='Fade out') items.push({lab:'Fade Length', val: fadeSec+'s', act(){ const i=FADE_SECS.indexOf(fadeSec); fadeSec=FADE_SECS[(i+1)%FADE_SECS.length]; if(sleepMin) startSleep(); saveSettings(); render(); }});
      if(sleepMin) items.push({lab:'Cancel Timer', act(){ sleepMin=0; clearSleep(); render(); }});
      return {title:'Sleep Timer', sleep:true, items};
    }
    case 'sleepdur': return {title:'Duration', items: SLEEP_DURS.map(d=>(
      {lab: d?d+' min':'Off', val: d===sleepMin?'\u2713':'', act(){ sleepMin=d; if(d) startSleep(); else clearSleep(); saveSettings(); back(); }}
    ))};
    case 'stats': return {title:'Statistics', stats:true};
    case 'about': return {title:'About', about:true};
    case 'np': return {title:'Now Playing', np:true};
    case 'extras': return {title:'Extras', items:[
      {lab:'Clock', arrow:true, go:{type:'clock'}},
      {lab:'Stopwatch', arrow:true, go:{type:'stopwatch', sel:0, top:0}},
      {lab:'Music Quiz', arrow:true, act(){ quiz = null; stack.push({type:'quiz'}); startQuizQuestion(); }},
      {lab:'Notes', arrow:true, go:{type:'notes', sel:0, top:0}},
      {lab:'Statistics', arrow:true, go:{type:'stats'}},
      {lab:'Customize', arrow:true, go:{type:'custom', sel:0, top:0}},
    ]};
    case 'apps': return {title:'Apps', greenSel:true, items: extApps.length ? [
      ...extApps.map(a=>({
        lab:a.name, arrow:true, market:true, iconLetter:(a.name||'?').trim().slice(0,1).toUpperCase(), extId:a.id,
        act(){ stack.push({type:'extapp', extId:a.id}); render(); }
      })),
      {lab:'Get More…', arrow:true, go:{type:'store', sel:0, top:0}},
    ] : [
      {lab:'No apps yet', dim:true},
      {lab:'Get More…', arrow:true, go:{type:'store', sel:0, top:0}},
    ]};
    case 'store': return {title:'Get More', items:[
      {lab:'Browse Apps', arrow:true, act(){ openStoreApps(); }},
      {lab:'Browse Themes', arrow:true, act(){ openStoreThemes(); }},
      {lab:'Browse Decals', arrow:true, act(){ openStoreDecals(); }},
    ]};
    case 'storeapps': {
      if(market.appsErr) return {title:'Browse Apps', items:[{lab:'Couldn’t load: '+market.appsErr, dim:true}]};
      if(market.apps===null) return {title:'Browse Apps', items:[{lab:'Loading…', dim:true}]};
      return {title:'Browse Apps', items: market.apps.length ? market.apps.map(a=>({
        lab:a.name||a.id, market:true, badge:true, iconLetter:(a.name||a.id||'?').trim().slice(0,1).toUpperCase(),
        val: extApps.some(x=>x.id===extAppKey(a)) ? 'Installed':'Get',
        act(){ installExtApp(a); }
      })) : [{lab:'No apps available', dim:true}]};
    }
    case 'storethemes': {
      if(market.themesErr) return {title:'Browse Themes', items:[{lab:'Couldn’t load: '+market.themesErr, dim:true}]};
      if(market.themes===null) return {title:'Browse Themes', items:[{lab:'Loading…', dim:true}]};
      return {title:'Browse Themes', items: market.themes.length ? market.themes.map(t=>({
        lab:t.name||t.id, market:true, badge:true, swatch: extThemeValid(t) ? t.b : null,
        val: !extThemeValid(t) ? 'Invalid' : (themeName===t.name ? 'Applied' : (extThemes.some(x=>x.id===extThemeKey(t)) ? 'Installed':'Get')),
        act(){ installExtTheme(t); }
      })) : [{lab:'No themes available', dim:true}]};
    }
    case 'storedecals': {
      if(market.decalsErr) return {title:'Browse Decals', items:[{lab:'Couldn’t load: '+market.decalsErr, dim:true}]};
      if(market.decals===null) return {title:'Browse Decals', items:[{lab:'Loading…', dim:true}]};
      return {title:'Browse Decals', items: market.decals.length ? market.decals.map(d=>({
        lab:d.name||d.id, market:true, badge:true, icon: typeof d.file==='string' ? resolveUrl(d.file) : null,
        val: extDecals.some(x=>x.id===decalKey(d)) ? 'Installed':'Get',
        act(){ installDecal(d); }
      })) : [{lab:'No decals available', dim:true}]};
    }
    case 'decalsmanage': return {title:'Decals', items: extDecals.length ? [
      {lab:'Arrange on Screen', act(){ enterArrangeMode(); }},
      ...extDecals.map(d=>({
        lab:d.name, val: d.hidden?'Hidden':'Shown', arrow:true, go:{type:'decalview', decalId:d.id, sel:0, top:0}
      })),
    ] : [{lab:'No decals installed', dim:true}]};
    case 'decalview': {
      const d = extDecals.find(x=>x.id===sc.decalId);
      return {title: d?d.name:'Decal', items:[
        {lab: d&&d.hidden ? 'Show' : 'Hide', act(){ toggleDecalHidden(sc.decalId); render(); }},
        {lab:'Remove', danger:true, act(){ removeDecal(sc.decalId); back(); }},
      ]};
    }
    case 'extapp': {
      const a = extApps.find(x=>x.id===sc.extId);
      return {title: a?a.name:'App', extapp:true, extId:sc.extId};
    }
    case 'quiz': return {title:'Music Quiz', quiz:true};
    case 'clock': return {title:'Clock', clock:true};
    case 'stopwatch': {
      const items = [];
      if(swRunning){
        items.push({lab:'Pause', act(){ swPause(); render(); }});
        items.push({lab:'Lap', act(){ swLap(); render(); }});
      } else {
        items.push({lab: swElapsedMs()>0 ? 'Resume' : 'Start', act(){ swStart(); render(); }});
        if(swElapsedMs()>0) items.push({lab:'Reset', act(){ swReset(); render(); }});
      }
      swLaps.forEach((ms,i)=>{ items.push({lab:'Lap '+(swLaps.length-i), val: fmtSW(ms), dim:true}); });
      return {title:'Stopwatch', stopwatch:true, items};
    }
    case 'notes': return {title:'Notes', items:[
      {lab:'Add Note…', act(){ const t=prompt('New note'); if(t && t.trim()){ addNote(t.trim()); render(); } }},
      ...(notes.length ? notes.map(n=>({lab:noteSummary(n), arrow:true, go:{type:'noteview', noteId:n.id, sel:0, top:0}}))
                       : [{lab:'No Notes', dim:true}]),
    ]};
    case 'noteview': {
      const n = notes.find(x=>x.id===sc.noteId);
      return {title:'Note', noteview:true, note:n, items:[
        {lab:'Delete Note', act(){ if(n) removeNote(n.id); back(); }},
      ]};
    }
  }
}

/* ---------- rendering ---------- */
function fmt(t){ if(!isFinite(t)) t=0; const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+String(s).padStart(2,'0'); }
const playSVG  = '<svg class="picon" viewBox="0 0 12 12" fill="#3c4048"><path d="M2 1l9 5-9 5z"/></svg>';
const pauseSVG = '<svg class="picon" viewBox="0 0 12 12" fill="#3c4048"><path d="M2 1h3v10H2zM7 1h3v10H7z"/></svg>';
const shufSVG  = '<svg viewBox="0 0 26 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 3h5l6 10h6"/><path d="M1 13h5l2-3.4M13 6.5L15 3h3"/><path d="M18 0l6 3-6 3zM18 10l6 3-6 3z" fill="currentColor" stroke="none"/></svg>';
const spkSVG   = '<svg viewBox="0 0 24 24" fill="#26292f"><path d="M3 9v6h4l5 4V5L7 9H3z"/><path d="M15 8a5 5 0 010 8M17.5 5.5a8.5 8.5 0 010 13" stroke="#26292f" stroke-width="1.8" fill="none"/></svg>';

/* ---------- real phone battery ---------- */
const batt = { level:0.92, charging:false, real:false };
if(navigator.getBattery){
  navigator.getBattery().then(b=>{
    const sync = ()=>{ batt.level=b.level; batt.charging=b.charging; batt.real=true; render(); };
    b.addEventListener('levelchange', sync);
    b.addEventListener('chargingchange', sync);
    sync();
  }).catch(()=>{});
}
const boltSVG = '<svg class="bolt" viewBox="0 0 10 14"><path d="M6 0L0 8h3.4L4 14l6-8H6.6z" fill="#fff" stroke="rgba(0,0,0,.45)" stroke-width="0.8"/></svg>';
function battHTML(){
  const pc = Math.round(batt.level*100);
  const cls = pc<=20 ? 'low' : pc<=45 ? 'mid' : '';
  return `<div class="batt ${cls}"><div class="fill" style="width:${Math.max(4,pc)}%"></div>${batt.charging?boltSVG:''}</div>`;
}

function sleepChipHTML(){
  const active = sleepUntil||stopAfterTrack;
  const txt = stopAfterTrack ? '\u266a' : (sleepUntil ? fmtClock(sleepRemaining()) : '');
  return `<span class="schip" id="sleepchip"${active?'':' style="display:none"'}>\u263D ${txt}</span>`;
}
function updateSleepChip(){
  const el = document.getElementById('sleepchip'); if(!el) return;
  const active = sleepUntil||stopAfterTrack;
  el.style.display = active ? '' : 'none';
  el.textContent = '\u263D ' + (stopAfterTrack ? '\u266a' : (sleepUntil ? fmtClock(sleepRemaining()) : ''));
}
setInterval(updateSleepChip, 1000);
function chromeHTML(title){
  const st = nowSong() ? (audio.paused? pauseSVG : playSVG) : '';
  return `<div class="chrome"><div class="pad"></div><div class="title">${esc(title)}</div><div class="stat">${sleepChipHTML()}${st}${battHTML()}</div></div>`;
}
function nowlineHTML(){
  const s = nowSong();
  const showNow = s && !['np','search','confirmdel'].includes(cur().type);
  if(!showNow) return '';
  return `<div class="nowline"><span class="pi">${audio.paused?'\u2016':'\u25b6'}</span>${esc(dispTitle(s.title))} \u2014 ${esc(s.artist)}</div>`;
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function lyricsHTML(s){
  if(s.sylt && s.sylt.length){
    const posMs = (audio.currentTime||0)*1000;
    let curIdx = -1;
    for(let i=0;i<s.sylt.length;i++){ if(s.sylt[i].t<=posMs) curIdx=i; else break; }
    const rows = s.sylt.map((ln,i)=>`<div class="lline ${i===curIdx?'cur':''}">${esc(ln.text)}</div>`).join('');
    return `<div class="lyrics">${rows}</div>`;
  }
  const lines = String(s.lyricsText||'').split('\n').map(l=>`<div class="lline">${esc(l)}</div>`).join('');
  return `<div class="lyrics plain">${lines}</div>`;
}
function dispTitle(s){ return String(s==null?'':s).replace(/\s*[\(\[][^\(\)\[\]]*[\)\]]/g, '').replace(/\s{2,}/g,' ').trim(); }

const VISIBLE = 12;

function render(){
  const sc = cur();
  if(sc.type!=='quiz' && !quizAudio.paused) quizAudio.pause();
  if(sc.type!=='quiz' && quizNextTimer){ clearTimeout(quizNextTimer); quizNextTimer=0; }
  if($qbar) $qbar.classList.toggle('hidden', screenDef(sc).search!==true);
  const def = screenDef(sc);
  let html = chromeHTML(def.title);

  if(def.np){
    const s = nowSong();
    if(!s){ stack.pop(); render(); return; }
    const total = playlist.length;
    const art = s.art ? `<div class="art" style="background-image:url('${s.art}')"></div>` : `<div class="art blank">♪</div>`;
    const pct = isFinite(audio.duration) && audio.duration>0 ? (audio.currentTime/audio.duration*100) : 0;
    let bottom;
    if(showVol){
      bottom = `<div class="vol">${spkSVG}<div class="track"><div class="prog" style="width:${Math.round(audio.volume*100)}%"></div></div></div>`;
    } else {
      bottom = `<span>${fmt(audio.currentTime)}</span>
        <div class="track ${npMode===1?'scrub':''}"><div class="prog" style="width:${pct}%"></div><div class="dia" style="left:${pct}%"></div></div>
        <span>-${fmt((audio.duration||0)-audio.currentTime)}</span>`;
    }
    const hasLyrics = !!(s.sylt || s.lyricsText);
    const showLyrics = npMode===2 && hasLyrics;
    const mid = showLyrics ? lyricsHTML(s) : `${art}
        <div class="meta">
          <div class="t">${esc(dispTitle(s.title))}</div>
          <div class="a">${esc(s.artist)}</div>
          <div class="al">${esc(s.album)}</div>
          <div class="cnt">${playlistLabel?esc(playlistLabel)+' · ':''}${pIdx+1} of ${total}${hasLyrics?' · Lyrics ⏵':''}</div>
        </div>`;
    html += `<div class="content"><div class="np">
      ${settings.shuffle?`<div class="shuf">${shufSVG}</div>`:''}
      <div class="mid${showLyrics?' lyr':''}">${mid}</div>
      <div class="bot">${bottom}</div>
    </div></div>`;
    html += nowlineHTML();
    $screen.innerHTML = html;
    if(showLyrics){
      const curLine = $screen.querySelector('.lline.cur');
      if(curLine) curLine.scrollIntoView({block:'center'});
    }
    return;
  }

  if(def.confirm){
    const selD = sc.sel||0;
    let art, nm;
    if(sc.kind==='app'){
      const a = extApps.find(x=>x.id===sc.extId);
      nm = a ? a.name : '';
      art = `<div class="cfmart blank">${esc((nm||'?').trim().slice(0,1).toUpperCase())}</div>`;
    } else {
      const s = song(sc.songId);
      nm = s ? dispTitle(s.title) : '';
      art = s&&s.art ? `<div class="cfmart" style="background-image:url('${s.art}')"></div>` : `<div class="cfmart blank">\u266a</div>`;
    }
    html += `<div class="content"><div class="confirm">
      <div class="ttl">${sc.kind==='app' ? 'Uninstall?' : 'Delete?'}</div>
      ${art}
      <div class="nm">${esc(nm)}</div>
      <div class="cfmbtns"><div class="cfmbtn ${selD===0?'sel':''}">Keep</div><div class="cfmbtn del ${selD===1?'sel':''}">${sc.kind==='app'?'Uninstall':'Delete'}</div></div>
    </div></div>`;
    html += nowlineHTML();
    $screen.innerHTML = html; return;
  }
  if(def.stats){
    const items = buildStatsItems();
    const rows = items.map(it=>`<div class="row dim"><span class="lab">${esc(it.lab)}</span><span class="val">${esc(it.val)}</span></div>`).join('');
    html += `<div class="content"><div class="list">${rows}</div></div>`;
    html += nowlineHTML();
    $screen.innerHTML = html;
    return;
  }
  if(def.about){
    html += `<div class="content"><div class="splash">
      <div class="big">${esc(custom.devName)}</div>
      <div class="small">Songs: ${lib.length}<br>Music stored on this device<br>Ads: none · Tracking: none<br><br>Hplay by host · IKSIX · v26.0</div>
    </div></div>`;
    html += nowlineHTML();
    $screen.innerHTML = html;
    return;
  }
  if(def.clock){
    const now = new Date();
    const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
    const date = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
    html += `<div class="content"><div class="splash">
      <div class="big" style="font-size:calc(var(--su)*30); font-variant-numeric:tabular-nums;">${time}</div>
      <div class="small">${date}</div>
    </div></div>`;
    html += nowlineHTML();
    $screen.innerHTML = html;
    return;
  }
  if(def.extapp){
    const a = extApps.find(x=>x.id===def.extId);
    if(!a){ stack.pop(); render(); return; }
    html += `<div class="content" style="display:block; padding:0;"><iframe id="extframe" class="extframe" sandbox="allow-scripts allow-forms allow-pointer-lock" style="width:100%;height:100%;border:0;background:#fff;"></iframe></div>`;
    $screen.innerHTML = html;
    const ifr = document.getElementById('extframe');
    if(ifr){
      if(!a._blobUrl) a._blobUrl = URL.createObjectURL(new Blob([a.html], {type:'text/html'}));
      ifr.src = a._blobUrl;
    }
    return;
  }
  if(def.quiz){
    if(!quiz || quiz.error){
      html += `<div class="content"><div class="splash">
        <div class="big" style="font-size:calc(var(--su)*13);">Need more music</div>
        <div class="small">Add at least 4 songs to play Music Quiz</div>
      </div></div>`;
    } else {
      let rows = '';
      quiz.choices.forEach((id,i)=>{
        const s = song(id);
        let cls = (i===quiz.sel && !quiz.revealed) ? 'sel' : '';
        if(quiz.revealed){
          if(id===quiz.correctId) cls += ' correct';
          else if(id===quiz.chosenId) cls += ' wrong';
        }
        rows += `<div class="row ${cls}"><span class="lab">${esc(s?dispTitle(s.title):'?')}</span></div>`;
      });
      const sub = !quiz.revealed ? 'Tap to answer' : (quiz.chosenId===quiz.correctId ? 'Correct! Tap for next' : 'Tap for next');
      html += `<div class="content" style="display:block">
        <div class="sleepclock" style="font-size:calc(var(--su)*14);">${quiz.score}<span class="sub">best ${appStats.quizBest} · ${sub}</span></div>
        <div class="list">${rows}</div>
      </div>`;
    }
    html += nowlineHTML();
    $screen.innerHTML = html;
    return;
  }

  const items = def.items;
  sc.sel = Math.max(0, Math.min(sc.sel, items.length-1));
  if(sc.sel < sc.top) sc.top = sc.sel;
  if(sc.sel > sc.top + VISIBLE-1) sc.top = sc.sel - (VISIBLE-1);

  let rows = '';
  for(let i=sc.top; i<Math.min(items.length, sc.top+VISIBLE); i++){
    const it = items[i];
    const icon = !it.market ? '' :
      it.icon    ? `<span class="micon"><img src="${it.icon}" alt=""></span>` :
      it.swatch  ? `<span class="micon swatch">${it.swatch.map(c=>`<i style="background:${esc(c)}"></i>`).join('')}</span>` :
      it.iconLetter ? `<span class="micon mono">${esc(it.iconLetter)}</span>` : '';
    const valCls = it.badge ? 'val badge'+(/Installed|Applied/.test(it.val||'')?' on':'') : 'val';
    rows += `<div class="row ${i===sc.sel?'sel':''} ${it.dim?'dim':''} ${it.danger?'danger':''} ${it.market?'market':''}">
      ${icon}
      <span class="lab">${esc(it.lab)}</span>
      ${it.val?`<span class="${valCls}">${esc(it.val)}</span>`:''}
      ${it.arrow?`<span class="arrow">›</span>`:''}
    </div>`;
  }
  let pane = '';
  if(def.split){
    const s = nowSong();
    const artUrl = s && s.art ? s.art : null;
    pane = `<div class="pane">${artUrl?`<div class="cover" style="background-image:url('${artUrl}')"></div>`:`<div class="logo">${esc(custom.devName)}</div>`}</div>`;
  }
  const listStyle = def.search ? ' style="padding-top:calc(var(--su)*22)"' : '';
  if(def.sleep){
    let big='--:--', sub='timer off';
    if(sleepMin>0){ if(stopAfterTrack){ big='\u266a'; sub='until track ends'; } else { big=fmtClock(sleepRemaining()); sub='remaining'; } }
    html += `<div class="content" style="display:block"><div class="sleepclock">${big}<span class="sub">${sub}</span></div><div class="list">${rows}</div></div>`;
  } else if(def.stopwatch){
    const big = fmtSW(swElapsedMs());
    const sub = swRunning ? 'running' : (swElapsedMs()>0 ? 'paused' : 'ready');
    html += `<div class="content" style="display:block"><div class="sleepclock">${big}<span class="sub">${sub}</span></div><div class="list">${rows}</div></div>`;
  } else if(def.noteview){
    const n = def.note;
    const txt = n ? n.text : '';
    const when = n ? new Date(n.ts).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
    html += `<div class="content" style="display:flex; flex-direction:column;">
      <div class="row" style="height:auto; white-space:normal; line-height:1.5; padding:calc(var(--su)*8) calc(var(--su)*6); flex:1; min-height:0; overflow:auto;">${esc(txt)}</div>
      <div class="row dim" style="height:auto; white-space:normal; font-size:calc(var(--su)*8); flex:0 0 auto;">${esc(when)}</div>
      <div class="list">${rows}</div>
    </div>`;
  } else {
    html += `<div class="content"><div class="list${def.greenSel?' greensel':''}"${listStyle}>${rows}</div>${pane}</div>`;
  }
  html += nowlineHTML();
  $screen.innerHTML = html;
}

setInterval(()=>{ render(); }, 60000);
setInterval(()=>{ if(cur().type==='np' && !showVol) render(); }, 1000);
setInterval(()=>{ if(cur().type==='np' && npMode===2) render(); }, 400);
setInterval(()=>{ if(cur().type==='sleeptimer' && (sleepUntil||stopAfterTrack)) render(); }, 1000);
setInterval(()=>{ if(cur().type==='clock') render(); }, 1000);
setInterval(()=>{ if(cur().type==='stopwatch' && swRunning) render(); }, 200);

/* ---------- controls ---------- */
function showLetter(ch){
  if(!$letter || !ch) return;
  $letter.textContent = ch; $letter.classList.remove('hidden'); $letter.style.opacity='1';
  clearTimeout(letterTimer); letterTimer=setTimeout(()=>{ $letter.style.opacity='0'; setTimeout(()=>$letter&&$letter.classList.add('hidden'),200); }, 650);
}
function scroll(dir, mult){
  clickSound();
  mult = mult || 1;
  const sc = cur();
  if(sc.type==='np'){
    if(npMode===1){
      const dur = isFinite(audio.duration) ? audio.duration : 0;
      const step = dur>0 ? Math.max(2, dur/60) : 5;
      const wanted = audio.currentTime + dir*step;
      audio.currentTime = dur>0 ? Math.max(0, Math.min(dur, wanted)) : Math.max(0, wanted);
    } else {
      audio.volume = Math.max(0, Math.min(1, Math.round((audio.volume + dir*0.05)*100)/100));
      showVol = true;
      clearTimeout(volTimer);
      volTimer = setTimeout(()=>{ showVol=false; saveSettings(); if(cur().type==='np') render(); }, 1200);
    }
    render();
    return;
  }
  if(pendingMedia){ permAskSel = Math.max(0, Math.min(1, permAskSel+dir)); renderPermAsk(); return; }
  if(sc.type==='confirmdel'){ sc.sel = Math.max(0, Math.min(1, (sc.sel||0)+dir)); render(); return; }
  if(sc.type==='quiz'){ quizScroll(dir); return; }
  if(sc.type==='songs' && sc.reordering && sc.filter && sc.filter.album){
    const album = sc.filter.album;
    const ids = listOf(sc.filter);
    const offset = 1; // the "Rename Playlist…" row above the song list
    const from = sc.sel - offset;
    const to = Math.max(0, Math.min(ids.length-1, from + dir*mult));
    if(from>=0 && to!==from){
      const [moved] = ids.splice(from, 1);
      ids.splice(to, 0, moved);
      playlistOrder[album] = ids;
      savePlaylistOrder();
      sc.sel = to + offset;
      if(navigator.vibrate) navigator.vibrate(6);
    }
    render();
    return;
  }
  const def = screenDef(sc);
  if(!def.items) return;
  const atEdge = (dir>0 && sc.sel===def.items.length-1) || (dir<0 && sc.sel===0);
  sc.sel = Math.max(0, Math.min(def.items.length-1, sc.sel + dir*mult));
  if(atEdge && navigator.vibrate) navigator.vibrate([2,14,2]);
  if(sc.type==='colors'){ applyTheme(Object.keys(THEMES)[sc.sel]); saveSettings(); }        // live preview
  if(sc.type==='wcolors'){ applyWheelColor(['Match',...Object.keys(THEMES)][sc.sel]); saveSettings(); }
  if(def.items.length > 25){ const lab=(def.items[sc.sel].lab||'').trim(); showLetter((lab[0]||'').toUpperCase()); }
  render();
}
function select(){
  ensureAC(); clickSound('select');
  const sc = cur();
  if(sc.type==='np'){
    const s = nowSong();
    const hasLyrics = s && (s.sylt || s.lyricsText);
    npMode = npMode===0 ? 1 : (npMode===1 && hasLyrics ? 2 : 0);
    render(); return;
  }
  if(pendingMedia){ (permAskSel===1?permYes:permNo)(); return; }
  if(sc.type==='confirmdel'){ (sc.sel===1?delYes:delNo)(); return; }
  if(sc.type==='quiz'){ quizAnswer(); return; }
  if(sc.type==='songs' && sc.reordering){ sc.reordering=false; toast('Order saved'); render(); return; }
  const def = screenDef(sc);
  const it = def.items && def.items[sc.sel];
  if(!it) return;
  if(it.go){ stack.push({...it.go}); render(); }
  else if(it.act) it.act();
}
function back(){
  ensureAC(); clickSound();
  if(pendingMedia){ permNo(); return; }
  if(arranging){ exitArrangeMode(); return; }
  if(stack.length>1){ npMode=0; stack.pop(); render(); }
}
function playPause(){
  ensureAC(); clickSound();
  if(!nowSong()){
    if(lib.length){ buildPlaylist(lib.map(s=>s.id), lib[0].id, 'All Songs'); stack.push({type:'np'}); render(); }
    return;
  }
  if(audio.paused) audio.play(); else audio.pause();
  if(cur().type!=='np') stack.push({type:'np'});
  render();
}

/* ---------- click wheel input (pointer + touch, sandbox-safe) ---------- */
const $face = document.getElementById('wheelFace');
let ptr = null;
let previewTimer = 0;
function hidePreview(){ clearTimeout(previewTimer); previewTimer=0; if($preview) $preview.classList.remove('show'); }
const STEP = 22;
const angle = (x,y,r) => Math.atan2(y-(r.top+r.height/2), x-(r.left+r.width/2))*180/Math.PI;
const dist  = (x,y,r) => Math.hypot(x-(r.left+r.width/2), y-(r.top+r.height/2)) / (r.width/2);
function tiltFace(x,y,r){
  const nx = (x-(r.left+r.width/2))/(r.width/2), ny = (y-(r.top+r.height/2))/(r.height/2);
  const MAX = 13, c = v => Math.max(-1, Math.min(1, v));
  const ease = v => Math.sign(v) * Math.pow(Math.min(1, Math.abs(v)), 1.15);
  if($face) $face.style.transform =
    `translateZ(-4px) rotateX(${(ease(-ny)*MAX).toFixed(2)}deg) rotateY(${(ease(nx)*MAX).toFixed(2)}deg)`;
}
function untiltFace(){ if($face){ $face.style.transition=''; $face.style.transform=''; } }

function currentRowSongId(){ const def=screenDef(cur()); const it=def.items&&def.items[cur().sel]; return it?it.songId:undefined; }
function currentRowExtId(){ const def=screenDef(cur()); const it=def.items&&def.items[cur().sel]; return it?it.extId:undefined; }
function currentRowPlaylistName(){ const def=screenDef(cur()); const it=def.items&&def.items[cur().sel]; return it?it.playlistName:undefined; }
function goHome(){ if(pendingMedia) permNo(); if(arranging) exitArrangeMode(); npMode=0; stack.length=1; stack[0]={type:'main', sel:0, top:0}; render(); }
function openSleep(){ stack.push({type:'sleeptimer', sel:0, top:0}); render(); }
function openDelete(id, kind){
  kind = kind||'song';
  stack.push({type:'confirmdel', kind, songId: kind==='song'?id:undefined, extId: kind==='app'?id:undefined, sel:0});
  render();
}
function fixSel(){ const sc=cur(); if(sc&&typeof sc.sel==='number'){ const it=(screenDef(sc).items||[]); if(sc.sel>=it.length) sc.sel=Math.max(0,it.length-1); } }
function delYes(){
  const sc=cur(); if(sc.type!=='confirmdel') return;
  if(sc.kind==='app'){ const id=sc.extId; stack.pop(); uninstallExt(id); fixSel(); render(); return; }
  const id=sc.songId; stack.pop(); removeSong(id); fixSel(); render();
}
function delNo(){ if(cur().type==='confirmdel'){ stack.pop(); render(); } }
// which hold action (if any) applies to where the finger is pressing
function holdActionFor(x,y,r){
  if(dist(x,y,r) < 0.4){
    const songId = currentRowSongId();
    if(songId!=null) return ()=>openDelete(songId,'song');
    const eid = currentRowExtId();
    if(eid!=null) return ()=>openDelete(eid,'app');
    const pname = currentRowPlaylistName();
    if(pname!=null) return ()=>renamePlaylist(pname);
    return null;
  }
  const a = angle(x,y,r);
  if(a>=-135 && a<-45) return goHome;       // hold MENU (top)  -> main menu
  if(a>=45 && a<135)  return openSleep;     // hold play/pause (bottom) -> sleep timer
  if(a>=-45 && a<45)  return 'scrub-fwd';   // hold NEXT (right) -> fast-forward through current song
  return 'scrub-back';                      // hold PREV (left)  -> rewind through current song
}
let scrubDir = 0, scrubIntervalId = 0;
function startScrub(dir){
  if(!nowSong()) return;
  scrubDir = dir;
  clearInterval(scrubIntervalId);
  scrubIntervalId = setInterval(()=>{
    if(!nowSong()){ stopScrub(); return; }
    const step = audio.duration ? Math.max(1, audio.duration/40) : 3;
    audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime + scrubDir*step));
    if(cur().type==='np') render();
  }, 120);
}
function stopScrub(){ clearInterval(scrubIntervalId); scrubIntervalId = 0; scrubDir = 0; }
function gStart(x,y,type){
  ensureAC();
  const r = $wheel.getBoundingClientRect();   // static layer -> stable geometry
  $wheel.classList.add('pressed');
  if($face) $face.style.transition = 'none';   // instant follow while pressed
  ptr = { rect:r, type, lastAng:angle(x,y,r), acc:0, travel:0, t0:Date.now(), holdTimer:0, heldFired:false, centerZone: dist(x,y,r) < 0.42 };
  const ha = holdActionFor(x,y,r);
  if(ha==='scrub-fwd' || ha==='scrub-back'){
    if(nowSong()){
      const dir = ha==='scrub-fwd' ? 1 : -1;
      ptr.holdTimer = setTimeout(()=>{ if(!ptr) return; ptr.heldFired=true; if(navigator.vibrate) navigator.vibrate(14); startScrub(dir); }, 350);
    }
  } else if(ha){
    ptr.holdTimer = setTimeout(()=>{ if(!ptr) return; ptr.heldFired=true; hidePreview(); if(navigator.vibrate) navigator.vibrate(18); ha(); }, 500);
  }
  if(dist(x,y,r) < 0.4 && cur().type==='np'){
    previewTimer = setTimeout(()=>{
      const html = songPreviewHTML();
      if(html && $preview){ $preview.innerHTML = html; $preview.classList.add('show'); }
    }, 160);
  }
  tiltFace(x,y,r);
}
function gMove(x,y){
  if(!ptr) return;
  tiltFace(x,y,ptr.rect);
  const a = angle(x,y,ptr.rect);
  let d = a - ptr.lastAng;
  if(d>180) d-=360; if(d<-180) d+=360;
  ptr.lastAng = a;
  if(ptr.centerZone) return;   // dead zone: gesture started on the center button, don't treat wiggle as wheel rotation
  // angular velocity (deg/ms) -> acceleration multiplier for long lists
  const now = Date.now(); const dt = Math.max(1, now-(ptr.lastT||now)); ptr.lastT = now;
  const vel = Math.abs(d)/dt;                        // deg per ms
  let mult = 1;
  const listLen = (screenDef(cur()).items||[]).length;
  if(listLen > 25){
    if(vel > 1.6) mult = 8; else if(vel > 0.9) mult = 4; else if(vel > 0.45) mult = 2;
  }
  if(ptr.holdTimer && ptr.travel>8){ clearTimeout(ptr.holdTimer); ptr.holdTimer=0; }
  if(ptr.travel>8) hidePreview();
  ptr.acc += d; ptr.travel += Math.abs(d);
  while(ptr.acc >  STEP){ ptr.acc -= STEP; scroll(1, mult); }
  while(ptr.acc < -STEP){ ptr.acc += STEP; scroll(-1, mult); }
}
function gEnd(x,y){
  $wheel.classList.remove('pressed');
  untiltFace();
  stopScrub();
  hidePreview();
  if(!ptr) return;
  if(ptr.holdTimer){ clearTimeout(ptr.holdTimer); ptr.holdTimer=0; }
  if(ptr.heldFired){ ptr=null; return; }
  const wasTap = ptr.travel < 12 && Date.now()-ptr.t0 < 450;
  const d = dist(x,y,ptr.rect), a = angle(x,y,ptr.rect);
  ptr = null;
  if(!wasTap) return;
  if(cur().type==='confirmdel'){
    if(d < 0.38){ select(); return; }        // center = confirm highlighted
    if(a>=-45 && a<45){ delYes(); return; }   // right = delete
    delNo(); return;                          // left / top / bottom = cancel
  }
  if(pendingMedia){
    if(d < 0.38){ select(); return; }        // center = confirm highlighted
    if(a>=-45 && a<45){ permYes(); return; }  // right = allow
    permNo(); return;                         // left / top / bottom = deny
  }
  if(d < 0.38){ select(); return; }
  if(a>=-135 && a<-45) back();
  else if(a>=-45 && a<45) nextTrack(false);
  else if(a>=45 && a<135) playPause();
  else prevTrack();
}
function gCancel(){ stopScrub(); hidePreview(); if(ptr&&ptr.holdTimer) clearTimeout(ptr.holdTimer); ptr=null; $wheel.classList.remove('pressed'); untiltFace(); }

$wheel.addEventListener('pointerdown', e=>{
  if(ptr) return;
  try{ $wheel.setPointerCapture(e.pointerId); }catch(_){}
  gStart(e.clientX, e.clientY, 'pointer');
  if(e.cancelable) e.preventDefault();
});
$wheel.addEventListener('pointermove', e=>{ if(ptr && ptr.type==='pointer'){ gMove(e.clientX,e.clientY); if(e.cancelable) e.preventDefault(); } });
$wheel.addEventListener('pointerup',   e=>{ if(ptr && ptr.type==='pointer') gEnd(e.clientX,e.clientY); });
$wheel.addEventListener('pointercancel', ()=>{ if(ptr && ptr.type==='pointer') gCancel(); });

$wheel.addEventListener('touchstart', e=>{
  if(e.cancelable) e.preventDefault();
  if(ptr) return;
  const t = e.touches[0]; if(t) gStart(t.clientX, t.clientY, 'touch');
}, {passive:false});
$wheel.addEventListener('touchmove', e=>{
  if(ptr && e.cancelable) e.preventDefault();
  if(!ptr || ptr.type!=='touch') return;
  const t = e.touches[0]; if(t) gMove(t.clientX, t.clientY);
}, {passive:false});
$wheel.addEventListener('touchend', e=>{
  if(!ptr || ptr.type!=='touch') return;
  const t = e.changedTouches[0]; if(t) gEnd(t.clientX, t.clientY);
}, {passive:false});
$wheel.addEventListener('touchcancel', ()=>{ if(ptr && ptr.type==='touch') gCancel(); }, {passive:false});

/* keyboard (desktop testing) */
addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight') scroll(1);
  else if(e.key==='ArrowUp'||e.key==='ArrowLeft') scroll(-1);
  else if(e.key==='Enter') select();
  else if(e.key==='Escape'||e.key==='Backspace') back();
  else if(e.key===' '){ e.preventDefault(); playPause(); }
});

applyCustom();
restore();
render();

(function boot(){
  const $boot = document.getElementById('bootScreen');
  if(!$boot) return;
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const wait = reduced ? 200 : 1650;
  setTimeout(()=>{
    $boot.classList.add('done');
    setTimeout(()=>{ $boot.remove(); }, reduced ? 0 : 550);
  }, wait);
})();
</script>
